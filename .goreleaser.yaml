version: 2

builds:
  - main: ./cmd/haven/
    binary: haven
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/havenapp/haven/internal/cli.version={{.Version}}

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "haven_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "haven_{{ .Version }}_checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"

brews:
  - repository:
      owner: yuritur
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/yuritur/haven"
    description: "Deploy open-source LLMs to your own cloud with one command"
    license: "MIT"
    install: |
      bin.install "haven"
    test: |
      system "#{bin}/haven", "--version"
